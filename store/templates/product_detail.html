{% extends 'base.html' %}

{% block content %}

<div style="
    background:#f0eded;
    padding:20px;
    margin:50px auto;
    border-radius:10px;
    width:340px;
    text-align:center;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
">

    <!-- 🔥 MAIN IMAGE -->
    <div class="slider-container">

        <div class="slider" id="slider">
            {% if product.images.all %}
                {% for img in product.images.all %}
                    <img src="{{ img.image.url }}" class="slide">
                {% endfor %}
            {% elif product.image %}
                <img src="{{ product.image.url }}" class="slide">
            {% endif %}
        </div>

        <button class="prev" onclick="prevSlide()">❮</button>
        <button class="next" onclick="nextSlide()">❯</button>

    </div>

    <!-- 🔥 THUMBNAILS -->
    <div class="thumb-container">
        {% for img in product.images.all %}
            <img src="{{ img.image.url }}" 
                 class="thumb"
                 onclick="goToSlide({{ forloop.counter0 }})">
        {% endfor %}
    </div>

    <!-- PRODUCT INFO -->
    <h2>{{ product.name }}</h2>
    <h3>₹{{ product.price }}</h3>
    <p>{{ product.description }}</p>

    <a href="/add-to-cart/{{ product.id }}/">
    <button class="cart-btn">Add to Cart</button>
</a>

<a href="/buy-now/{{ product.id }}/">
    <button class="buy-btn">Buy Now ⚡</button>
</a>

</div>

<!-- 🔥 FULLSCREEN -->
<div id="fullscreen" onclick="closeFull()" style="
    display:none;
    position:fixed;
    top:0; left:0;
    width:100%;
    height:100%;
    background:black;
    justify-content:center;
    align-items:center;
    z-index:999;
">
    <img id="fullImg" style="max-width:90%; max-height:90%;">
</div>

<!-- 🔥 CSS -->
<style>
.slider-container {
    position: relative;
    overflow: hidden;
}

.slider {
    display: flex;
    transition: 0.4s;
}

.slide {
    min-width: 100%;
    height: 220px;
    object-fit: cover;
    cursor: pointer;
    border-radius:10px;
}

.prev, .next {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: black;
    color: white;
    border: none;
    padding: 8px;
    cursor: pointer;
}

.prev { left: 5px; }
.next { right: 5px; }

.thumb-container {
    margin-top:10px;
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
}

.thumb {
    width:60px;
    height:60px;
    object-fit:cover;
    margin:5px;
    cursor:pointer;
    border-radius:6px;
    opacity:0.6;
}

.thumb:hover {
    opacity:1;
}
</style>

<!-- 🔥 JS -->
<script>
let index = 0;
let startX = 0;

function showSlide() {
    let slider = document.getElementById("slider");
    slider.style.transform = "translateX(" + (-index * 100) + "%)";
}

function nextSlide() {
    let slides = document.querySelectorAll('.slide');
    index = (index + 1) % slides.length;
    showSlide();
}

function prevSlide() {
    let slides = document.querySelectorAll('.slide');
    index = (index - 1 + slides.length) % slides.length;
    showSlide();
}

function goToSlide(i) {
    index = i;
    showSlide();
}

// 🔥 TOUCH SWIPE
let slider = document.getElementById("slider");

slider.addEventListener("touchstart", e => {
    startX = e.touches[0].clientX;
});

slider.addEventListener("touchend", e => {
    let endX = e.changedTouches[0].clientX;

    if (startX - endX > 50) {
        nextSlide(); // swipe left
    } else if (endX - startX > 50) {
        prevSlide(); // swipe right
    }
});

// 🔥 FULLSCREEN
document.querySelectorAll('.slide').forEach(img => {
    img.onclick = function() {
        document.getElementById('fullscreen').style.display = 'flex';
        document.getElementById('fullImg').src = this.src;
    }
});

function closeFull() {
    document.getElementById('fullscreen').style.display = 'none';
}
</script>

{% endblock %}
