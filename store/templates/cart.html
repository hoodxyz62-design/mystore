{% extends 'base.html' %}

{% block content %}

<h2 style="text-align:center;">Your Cart 🛒</h2>

<div style="display:flex; justify-content:center; flex-wrap:wrap;">

{% for item in items %}

    <div style="
        background:#fff;
        padding:20px;
        margin:15px;
        border-radius:10px;
        width:220px;
        text-align:center;
        box-shadow:0 0 10px rgba(0,0,0,0.2);
    ">

        <!-- 🔥 IMAGE ADD -->
        {% if item.product.image %}
            <img src="{{ item.product.image.url }}" 
                 style="width:100%; height:150px; object-fit:cover; border-radius:10px;">
        {% endif %}

        <h3>{{ item.product.name }}</h3>

        <p>₹{{ item.product.price }}</p>

        <div style="display:flex; justify-content:center; align-items:center; gap:10px; margin:10px 0;">

            <a href="/decrease/{{ item.id }}/" 
               style="padding:5px 10px; background:red; color:white; border-radius:5px; text-decoration:none;">
               -
            </a>

            <span style="font-size:18px;">{{ item.quantity }}</span>

            <a href="/increase/{{ item.id }}/" 
               style="padding:5px 10px; background:green; color:white; border-radius:5px; text-decoration:none;">
               +
            </a>

        </div>

        <a href="/remove/{{ item.id }}/">
            <button style="padding:8px 15px; background:black; color:white; border:none; border-radius:5px;">
                Remove ❌
            </button>
        </a>

    </div>

{% endfor %}

</div>

<h3 style="text-align:center;">Total: ₹{{ total }}</h3>

<div style="text-align:center; margin-top:20px;">
    <a href="/checkout/">
        <button style="padding:10px 20px; background:green; color:white; border:none; border-radius:5px;">
            Proceed to Checkout 💳
        </button>
    </a>
</div>

{% endblock %}
